name: Publish Release Assets

on:
  push:
    branches:
      - 'release-assets/**'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out staging branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Copy staged tarballs out of the release branch
        run: |
          mkdir -p "${RUNNER_TEMP}/release-staging"
          cp .release-staging/ah-macos-arm64.tar.gz "${RUNNER_TEMP}/release-staging/"
          cp .release-staging/ah-macos-x86_64.tar.gz "${RUNNER_TEMP}/release-staging/"

      - name: Switch to main
        run: |
          git fetch origin main
          git switch main
          git pull --ff-only origin main

      - name: Publish release assets and update formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME#release-assets/}"
          ./scripts/publish-release-assets.sh \
            --version "${RELEASE_TAG}" \
            --staging-dir "${RUNNER_TEMP}/release-staging"

      - name: Verify formula
        run: ./scripts/verify-formula.sh

      - name: Commit formula update
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME#release-assets/}"

          if git diff --quiet; then
            echo "Formula already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/agent-harbor.rb
          git commit -F - <<EOF
          fix(tap): update formula for ${RELEASE_TAG}

          Publish Homebrew formula metadata for Agent Harbor ${RELEASE_TAG}.

          Update the GitHub release asset URLs and per-architecture SHA-256
          values to match the staged macOS CLI tarballs.
          EOF
          git push origin HEAD:main

      - name: Delete staging branch
        if: success()
        run: git push origin --delete "${GITHUB_REF_NAME}"
